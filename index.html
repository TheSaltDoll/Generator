<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RandGen">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>RandGen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#14141f;
  --surface2:#1c1c2e;
  --border:#2a2a40;
  --text:#e8e8f0;
  --text-dim:#8888a0;
  --accent:#6c5ce7;
  --accent-glow:#6c5ce740;
  --accent2:#00cec9;
  --danger:#ff6b6b;
  --success:#00b894;
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}
body{
  display:flex;flex-direction:column;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
}

/* ── Header ── */
.header{
  padding:16px 20px 12px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--bg);
  position:relative;z-index:10;
}
.header .back-btn{
  display:none;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:18px;
  width:36px;height:36px;border-radius:10px;
  cursor:pointer;place-items:center;
  transition:background .2s;
}
.header .back-btn:active{background:var(--accent);border-color:var(--accent)}
.header .back-btn.visible{display:grid}
.header h1{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;font-weight:700;
  letter-spacing:-0.5px;color:var(--accent2);
}
.header .subtitle{
  font-size:12px;color:var(--text-dim);
  font-weight:400;margin-left:auto;
  font-family:'JetBrains Mono',monospace;
}

/* ── Screens ── */
.screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:16px 20px 32px;
}
.screen.hidden{display:none}

#genScreen{
  display:flex;flex-direction:column;
  padding:0;overflow:hidden;
}
#genScreen.hidden{display:none}

.gen-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:16px 20px 16px;
}

.result-panel{
  flex-shrink:0;background:var(--bg);
  border-top:1px solid var(--border);
  padding:14px 20px;
  padding-bottom:calc(14px + var(--safe-bottom));
}

/* ── Tag list ── */
.tag-list{display:flex;flex-direction:column;gap:10px}
.tag-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  transition:transform .15s,border-color .2s,box-shadow .2s;
}
.tag-card:active{transform:scale(0.97);border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.tag-card .tag-name{font-weight:600;font-size:17px;letter-spacing:-0.3px}
.tag-card .tag-count{
  font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);
  background:var(--surface2);padding:4px 10px;border-radius:8px;
}

/* ── Generator buttons ── */
.gen-list{display:flex;flex-direction:column;gap:10px}
.gen-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 20px;
  cursor:pointer;color:var(--text);font-family:'Outfit',sans-serif;
  font-size:16px;font-weight:500;text-align:left;
  transition:transform .15s,border-color .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.gen-btn:active{transform:scale(0.97);border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.gen-btn .remaining{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:4px}
.gen-btn.exhausted{opacity:0.35;pointer-events:none;border-style:dashed}
.gen-btn.active{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}

/* ── Result display ── */
.result-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;width:100%;
  text-align:center;position:relative;overflow:hidden;
}
.result-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent-glow),transparent 60%);
  opacity:0;transition:opacity .5s;pointer-events:none;
}
.result-box.flash::before{opacity:1}
.result-top-row{display:flex;align-items:center;justify-content:center;margin-bottom:8px;position:relative}
.result-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.result-chance{
  position:absolute;right:0;top:0;font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--text-dim);opacity:0;transition:opacity .3s;
}
.result-chance.visible{opacity:1}
.result-value{font-size:24px;font-weight:700;letter-spacing:-0.5px;line-height:1.3;transition:opacity .25s ease,transform .25s ease}
.result-value.exit{opacity:0;transform:translateY(-16px) scale(0.95)}
.result-value.enter{opacity:0;transform:translateY(16px) scale(0.95)}
.result-placeholder{color:var(--text-dim);font-size:15px;font-style:italic}

/* ── Frequency tracker ── */
.freq-section{margin-top:16px}
.freq-section.hidden{display:none}
.freq-header{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:8px;padding:0 4px}
.freq-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.freq-row{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--border);animation:fadeSlideIn .25s ease both}
.freq-row:last-child{border-bottom:none}
.freq-outcome{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.freq-actual{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent2);min-width:28px;text-align:right}
.freq-expected{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);min-width:65px;text-align:right}
.freq-bar-bg{width:60px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;flex-shrink:0}
.freq-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s ease}

/* ── Pair results (in scroll area) ── */
.pair-results{margin-top:16px}
.pair-results.hidden{display:none}
.pair-results-header{
  font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text-dim);margin-bottom:8px;padding:0 4px;
  display:flex;align-items:center;justify-content:space-between;
}
.pair-reshuffle{
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  color:var(--accent);background:none;border:1px solid var(--accent);
  border-radius:8px;padding:4px 12px;cursor:pointer;
  text-transform:none;letter-spacing:0;
  transition:background .2s,color .2s;
}
.pair-reshuffle:active{background:var(--accent);color:#fff}
.pair-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.pair-row{
  display:flex;align-items:center;padding:12px 16px;gap:12px;
  border-bottom:1px solid var(--border);animation:fadeSlideIn .25s ease both;
}
.pair-row:last-child{border-bottom:none}
.pair-slot{
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
  color:var(--accent2);min-width:60px;flex-shrink:0;
}
.pair-arrow{color:var(--text-dim);font-size:14px;flex-shrink:0}
.pair-name{font-size:15px;font-weight:500;text-align:left;flex:1}

/* ── Pair input modal ── */
.pair-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:100;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.pair-modal-overlay.visible{opacity:1;pointer-events:auto}
.pair-modal{
  background:var(--bg);border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  width:100%;max-width:500px;
  max-height:85vh;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,.0,.2,1);
  padding-bottom:var(--safe-bottom);
}
.pair-modal-overlay.visible .pair-modal{transform:translateY(0)}
.pair-modal-header{
  padding:20px 20px 12px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.pair-modal-title{font-size:18px;font-weight:700;margin-bottom:4px}
.pair-modal-subtitle{font-size:13px;color:var(--text-dim)}
.pair-modal-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 20px;
  display:flex;flex-direction:column;gap:10px;
}
.pair-input-row{display:flex;align-items:center;gap:10px}
.pair-input-num{
  font-family:'JetBrains Mono',monospace;font-size:13px;
  color:var(--text-dim);min-width:24px;text-align:right;
}
.pair-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;
  outline:none;transition:border-color .2s;
}
.pair-input:focus{border-color:var(--accent)}
.pair-input::placeholder{color:var(--text-dim);opacity:0.5}
.pair-modal-footer{
  padding:12px 20px 16px;flex-shrink:0;
  border-top:1px solid var(--border);
  display:flex;gap:10px;
}
.pair-cancel-btn{
  flex:1;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'Outfit',sans-serif;
  font-size:15px;font-weight:600;padding:14px;border-radius:12px;cursor:pointer;
  transition:background .2s;
}
.pair-cancel-btn:active{background:var(--surface2)}
.pair-shuffle-btn{
  flex:2;background:var(--accent);border:none;
  color:#fff;font-family:'Outfit',sans-serif;
  font-size:15px;font-weight:600;padding:14px;border-radius:12px;cursor:pointer;
  transition:opacity .2s;
}
.pair-shuffle-btn:active{opacity:0.8}
.pair-shuffle-btn:disabled{opacity:0.4;cursor:default}

/* ── Controls ── */
.controls{margin-top:16px;display:flex;flex-direction:column;gap:14px}
.control-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 18px;
}
.control-row .label{font-size:14px;font-weight:500;color:var(--text)}
.control-row .label small{display:block;font-size:11px;color:var(--text-dim);font-weight:400;margin-top:2px}
.toggle{
  width:50px;height:28px;background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;position:relative;cursor:pointer;
  transition:background .25s,border-color .25s;flex-shrink:0;
}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle .knob{
  width:22px;height:22px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;
  transition:transform .25s cubic-bezier(.4,.0,.2,1);
  box-shadow:0 1px 4px #0003;
}
.toggle.on .knob{transform:translateX(22px)}
.reset-btn{
  background:none;border:1px solid var(--danger);color:var(--danger);
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;
  padding:10px 20px;border-radius:10px;cursor:pointer;
  transition:background .2s,color .2s;
}
.reset-btn:active{background:var(--danger);color:#fff}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty .icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty p{font-size:14px;line-height:1.6}

/* ── Animations ── */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeSlideIn .3s ease both}
.animate-in:nth-child(1){animation-delay:0s}
.animate-in:nth-child(2){animation-delay:.04s}
.animate-in:nth-child(3){animation-delay:.08s}
.animate-in:nth-child(4){animation-delay:.12s}
.animate-in:nth-child(5){animation-delay:.16s}
.animate-in:nth-child(6){animation-delay:.2s}
.animate-in:nth-child(7){animation-delay:.24s}
.animate-in:nth-child(8){animation-delay:.28s}
.animate-in:nth-child(9){animation-delay:.32s}
.animate-in:nth-child(10){animation-delay:.36s}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" aria-label="Back">←</button>
  <h1 id="headerTitle">RandGen</h1>
  <span class="subtitle" id="headerSub"></span>
</div>

<!-- Tag selection screen -->
<div class="screen" id="tagScreen">
  <div class="tag-list" id="tagList"></div>
</div>

<!-- Generator screen -->
<div id="genScreen" class="hidden">
  <div class="gen-scroll">
    <div class="gen-list" id="genList"></div>

    <!-- Pair results (shown in scroll area) -->
    <div class="pair-results hidden" id="pairResults">
      <div class="pair-results-header">
        <span id="pairResultsTitle">Pairings</span>
        <button class="pair-reshuffle" id="pairReshuffle">Reshuffle</button>
      </div>
      <div class="pair-table" id="pairTable"></div>
    </div>

    <div class="freq-section hidden" id="freqSection">
      <div class="freq-header" id="freqHeader">History</div>
      <div class="freq-table" id="freqTable"></div>
    </div>

    <div class="controls">
      <div class="control-row">
        <div class="label">
          No Repeats
          <small id="toggleLabel">Select a generator</small>
        </div>
        <div class="toggle" id="noRepeatToggle" role="switch" aria-checked="false" style="opacity:0.4;pointer-events:none">
          <div class="knob"></div>
        </div>
      </div>
      <div class="control-row" style="justify-content:center">
        <button class="reset-btn" id="resetBtn">Reset All Generators</button>
      </div>
    </div>
  </div>

  <div class="result-panel">
    <div class="result-box" id="resultBox">
      <div class="result-top-row">
        <span class="result-label">Result</span>
        <span class="result-chance" id="resultChance"></span>
      </div>
      <div class="result-value" id="resultValue">
        <span class="result-placeholder">Tap a generator above</span>
      </div>
    </div>
  </div>
</div>

<!-- Pair input modal -->
<div class="pair-modal-overlay" id="pairOverlay">
  <div class="pair-modal">
    <div class="pair-modal-header">
      <div class="pair-modal-title" id="pairModalTitle">Enter Items</div>
      <div class="pair-modal-subtitle" id="pairModalSubtitle"></div>
    </div>
    <div class="pair-modal-body" id="pairModalBody"></div>
    <div class="pair-modal-footer">
      <button class="pair-cancel-btn" id="pairCancelBtn">Cancel</button>
      <button class="pair-shuffle-btn" id="pairShuffleBtn">Shuffle & Assign</button>
    </div>
  </div>
</div>

<script>
// ── Config parser ──
function parseConfig(text) {
  const generators = [];
  let current = null;
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line || line.startsWith('#') || line.startsWith(';')) continue;
    const header = line.match(/^\[(.+?):(.+?)\]$/);
    if (header) {
      current = {
        tag: header[1].trim(),
        name: header[2].trim(),
        repeat: true,
        pairMode: false,
        pairLabel: '',
        outcomes: []
      };
      generators.push(current);
    } else if (current) {
      // Check for repeat= directive
      const repeatMatch = line.match(/^repeat\s*=\s*(yes|no|true|false)$/i);
      if (repeatMatch) {
        const val = repeatMatch[1].toLowerCase();
        current.repeat = (val === 'yes' || val === 'true');
        continue;
      }
      // Check for pair= directive
      const pairMatch = line.match(/^pair\s*=\s*(.+)$/i);
      if (pairMatch) {
        current.pairMode = true;
        current.pairLabel = pairMatch[1].trim();
        continue;
      }
      // Pair mode: lines are just slot labels (with optional |sortOrder)
      if (current.pairMode) {
        const parts = line.split('|');
        const slotText = parts[0].trim();
        const sortOrder = parts.length >= 2 ? parseInt(parts[1], 10) : current.outcomes.length + 1;
        if (slotText) {
          current.outcomes.push({ text: slotText, weight: isNaN(sortOrder) ? current.outcomes.length + 1 : sortOrder });
        }
      } else {
        const parts = line.split('|');
        if (parts.length >= 2) {
          const weight = parseInt(parts[parts.length - 1], 10);
          const txt = parts.slice(0, -1).join('|').trim();
          if (txt && !isNaN(weight) && weight > 0) {
            current.outcomes.push({ text: txt, weight });
          }
        }
      }
    }
  }
  return generators;
}

// ── State ──
let allGenerators = [];
let tags = [];
let currentTag = null;
let activeGenIdx = null;
const noRepeatState = {};
const remaining = {};
const history = {};
let lastPickedChance = null;
// Pair mode state
let activePairIdx = null;
let lastPairInputs = [];

// ── Weighted random pick ──
function weightedPick(outcomes) {
  const total = outcomes.reduce((s, o) => s + o.weight, 0);
  if (total === 0) return null;
  let r = Math.random() * total;
  for (const o of outcomes) {
    r -= o.weight;
    if (r <= 0) return o;
  }
  return outcomes[outcomes.length - 1];
}

// ── Fisher-Yates shuffle ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── DOM refs ──
const backBtn = document.getElementById('backBtn');
const headerTitle = document.getElementById('headerTitle');
const headerSub = document.getElementById('headerSub');
const tagScreen = document.getElementById('tagScreen');
const genScreen = document.getElementById('genScreen');
const tagList = document.getElementById('tagList');
const genList = document.getElementById('genList');
const resultBox = document.getElementById('resultBox');
const resultValue = document.getElementById('resultValue');
const resultChance = document.getElementById('resultChance');
const freqSection = document.getElementById('freqSection');
const freqHeader = document.getElementById('freqHeader');
const freqTable = document.getElementById('freqTable');
const pairResultsEl = document.getElementById('pairResults');
const pairResultsTitle = document.getElementById('pairResultsTitle');
const pairReshuffle = document.getElementById('pairReshuffle');
const pairTable = document.getElementById('pairTable');
const pairOverlay = document.getElementById('pairOverlay');
const pairModalTitle = document.getElementById('pairModalTitle');
const pairModalSubtitle = document.getElementById('pairModalSubtitle');
const pairModalBody = document.getElementById('pairModalBody');
const pairCancelBtn = document.getElementById('pairCancelBtn');
const pairShuffleBtn = document.getElementById('pairShuffleBtn');
const noRepeatToggle = document.getElementById('noRepeatToggle');
const toggleLabel = document.getElementById('toggleLabel');
const resetBtn = document.getElementById('resetBtn');

// ── Render tags ──
function renderTags() {
  tagList.innerHTML = '';
  tags.forEach((tag) => {
    const count = allGenerators.filter(g => g.tag === tag).length;
    const card = document.createElement('div');
    card.className = 'tag-card animate-in';
    card.innerHTML = `
      <span class="tag-name">${tag}</span>
      <span class="tag-count">${count} gen${count !== 1 ? 's' : ''}</span>
    `;
    card.addEventListener('click', () => selectTag(tag));
    tagList.appendChild(card);
  });
  if (tags.length === 0) {
    tagList.innerHTML = `<div class="empty">
      <div class="icon">⚙️</div>
      <p>No generators found.<br>Edit <strong>generators.txt</strong> and redeploy.</p>
    </div>`;
  }
}

// ── Select tag ──
function selectTag(tag) {
  currentTag = tag;
  activeGenIdx = null;
  activePairIdx = null;
  lastPairInputs = [];
  lastPickedChance = null;
  for (const key in history) delete history[key];
  tagScreen.classList.add('hidden');
  genScreen.classList.remove('hidden');
  backBtn.classList.add('visible');
  headerTitle.textContent = tag;
  const gens = allGenerators.filter(g => g.tag === tag);
  headerSub.textContent = gens.length + ' generator' + (gens.length !== 1 ? 's' : '');
  resultValue.innerHTML = '<span class="result-placeholder">Tap a generator above</span>';
  resultChance.classList.remove('visible');
  resultChance.textContent = '';
  freqSection.classList.add('hidden');
  pairResultsEl.classList.add('hidden');
  updateToggleUI();
  renderGenerators();
}

// ── Back ──
function goBack() {
  currentTag = null;
  activePairIdx = null;
  lastPairInputs = [];
  for (const key in history) delete history[key];
  genScreen.classList.add('hidden');
  tagScreen.classList.remove('hidden');
  backBtn.classList.remove('visible');
  headerTitle.textContent = 'RandGen';
  headerSub.textContent = '';
}
backBtn.addEventListener('click', goBack);

// ── Per-generator noRepeat ──
function isNoRepeat(idx) {
  if (!(idx in noRepeatState)) {
    noRepeatState[idx] = !allGenerators[idx].repeat;
  }
  return noRepeatState[idx];
}

// ── Update toggle UI ──
function updateToggleUI() {
  if (activeGenIdx !== null && !allGenerators[activeGenIdx].pairMode) {
    const nr = isNoRepeat(activeGenIdx);
    noRepeatToggle.classList.toggle('on', nr);
    noRepeatToggle.setAttribute('aria-checked', nr);
    noRepeatToggle.style.opacity = '1';
    noRepeatToggle.style.pointerEvents = '';
    toggleLabel.textContent = allGenerators[activeGenIdx].name;
  } else {
    noRepeatToggle.classList.remove('on');
    noRepeatToggle.setAttribute('aria-checked', 'false');
    noRepeatToggle.style.opacity = '0.4';
    noRepeatToggle.style.pointerEvents = 'none';
    toggleLabel.textContent = activeGenIdx !== null && allGenerators[activeGenIdx].pairMode
      ? 'N/A for pair mode' : 'Select a generator';
  }
}

// ── Render generators ──
function renderGenerators() {
  genList.innerHTML = '';
  const gens = allGenerators.filter(g => g.tag === currentTag);
  gens.forEach((gen) => {
    const globalIdx = allGenerators.indexOf(gen);
    const btn = document.createElement('button');
    btn.className = 'gen-btn animate-in';
    if (globalIdx === activeGenIdx || globalIdx === activePairIdx) btn.classList.add('active');

    let inner = `<div>${gen.name}</div>`;
    if (gen.pairMode) {
      inner += `<div class="remaining" style="color:var(--accent)">pair · ${gen.outcomes.length} slots · ${gen.pairLabel}</div>`;
      btn.innerHTML = inner;
      btn.addEventListener('click', () => openPairModal(globalIdx));
    } else {
      const nr = isNoRepeat(globalIdx);
      const rem = getRemaining(globalIdx);
      const isExhausted = nr && rem.length === 0;
      if (isExhausted) btn.classList.add('exhausted');
      if (nr) {
        inner += `<div class="remaining">${rem.length}/${gen.outcomes.length} left · no repeats</div>`;
      } else {
        inner += `<div class="remaining" style="color:var(--accent2)">repeatable</div>`;
      }
      btn.innerHTML = inner;
      btn.addEventListener('click', () => generate(globalIdx));
    }
    genList.appendChild(btn);
  });
}

// ── Get remaining outcomes ──
function getRemaining(idx) {
  if (!(idx in remaining)) {
    remaining[idx] = [...allGenerators[idx].outcomes];
  }
  return remaining[idx];
}

// ── Generate (standard) ──
function generate(idx) {
  const gen = allGenerators[idx];
  const nr = isNoRepeat(idx);
  let pool, picked;

  activeGenIdx = idx;
  activePairIdx = null;
  pairResultsEl.classList.add('hidden');
  updateToggleUI();

  if (nr) {
    pool = getRemaining(idx);
    if (pool.length === 0) return;
    picked = weightedPick(pool);
    if (!picked) return;
    const totalBefore = pool.reduce((s, o) => s + o.weight, 0);
    lastPickedChance = (picked.weight / totalBefore) * 100;
    const pi = pool.indexOf(picked);
    pool.splice(pi, 1);
    remaining[idx] = pool;
  } else {
    pool = gen.outcomes;
    picked = weightedPick(pool);
    if (!picked) return;
    const total = pool.reduce((s, o) => s + o.weight, 0);
    lastPickedChance = (picked.weight / total) * 100;
  }

  if (!history[idx]) history[idx] = {};
  history[idx][picked.text] = (history[idx][picked.text] || 0) + 1;

  resultValue.classList.add('exit');
  resultChance.classList.remove('visible');
  resultBox.classList.remove('flash');

  setTimeout(() => {
    resultValue.textContent = picked.text;
    resultChance.textContent = lastPickedChance.toFixed(2) + '%';
    resultValue.classList.remove('exit');
    resultValue.classList.add('enter');
    void resultBox.offsetWidth;
    resultBox.classList.add('flash');
    setTimeout(() => { resultValue.classList.remove('enter'); resultChance.classList.add('visible'); }, 30);
    setTimeout(() => { resultBox.classList.remove('flash'); }, 600);
  }, 280);

  renderGenerators();
  renderFrequency(idx);
}

// ── Render frequency table ──
function renderFrequency(idx) {
  const gen = allGenerators[idx];
  const hist = history[idx];
  if (!hist || Object.keys(hist).length === 0) { freqSection.classList.add('hidden'); return; }

  freqSection.classList.remove('hidden');
  freqHeader.textContent = gen.name + ' — History';
  const totalDraws = Object.values(hist).reduce((s, c) => s + c, 0);
  const totalWeight = gen.outcomes.reduce((s, o) => s + o.weight, 0);
  const maxCount = Math.max(...Object.values(hist));
  freqTable.innerHTML = '';
  const entries = Object.entries(hist).sort((a, b) => b[1] - a[1]);

  entries.forEach(([text, count]) => {
    const outcomeWeight = gen.outcomes.filter(o => o.text === text).reduce((s, o) => s + o.weight, 0);
    const expectedPct = (outcomeWeight / totalWeight) * 100;
    const actualPct = totalDraws > 0 ? (count / totalDraws) * 100 : 0;
    const barWidth = maxCount > 0 ? (count / maxCount) * 100 : 0;
    const row = document.createElement('div');
    row.className = 'freq-row';
    row.innerHTML = `
      <div class="freq-outcome">${text}</div>
      <div class="freq-bar-bg"><div class="freq-bar" style="width:${barWidth}%"></div></div>
      <div class="freq-actual">${count}</div>
      <div class="freq-expected">${actualPct.toFixed(2)}% <span style="color:var(--text-dim);opacity:0.5">/ ${expectedPct.toFixed(2)}%</span></div>
    `;
    freqTable.appendChild(row);
  });
}

// ════════════════════════════════════════
// ── PAIR MODE ──
// ════════════════════════════════════════

function openPairModal(idx) {
  const gen = allGenerators[idx];
  activePairIdx = idx;
  activeGenIdx = null;
  freqSection.classList.add('hidden');
  updateToggleUI();
  renderGenerators();

  const count = gen.outcomes.length;
  pairModalTitle.textContent = gen.name;
  pairModalSubtitle.textContent = `Enter ${count} ${gen.pairLabel}`;
  pairModalBody.innerHTML = '';

  for (let i = 0; i < count; i++) {
    const row = document.createElement('div');
    row.className = 'pair-input-row';
    const prevValue = lastPairInputs[i] || '';
    row.innerHTML = `
      <span class="pair-input-num">${i + 1}.</span>
      <input class="pair-input" type="text" placeholder="${gen.pairLabel.replace(/s$/i, '')} ${i + 1}"
             value="${prevValue}" autocomplete="off" autocorrect="off" spellcheck="false">
    `;
    pairModalBody.appendChild(row);
  }

  updateShuffleBtn();
  pairOverlay.classList.add('visible');

  // Focus first empty input
  setTimeout(() => {
    const inputs = pairModalBody.querySelectorAll('.pair-input');
    for (const inp of inputs) {
      if (!inp.value.trim()) { inp.focus(); break; }
    }
    if ([...inputs].every(inp => inp.value.trim())) inputs[0]?.focus();
  }, 350);
}

function updateShuffleBtn() {
  const inputs = pairModalBody.querySelectorAll('.pair-input');
  const filled = [...inputs].filter(inp => inp.value.trim()).length;
  pairShuffleBtn.disabled = filled < inputs.length;
}

pairModalBody.addEventListener('input', updateShuffleBtn);

// Allow Enter to move to next input or submit
pairModalBody.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const inputs = [...pairModalBody.querySelectorAll('.pair-input')];
    const currentIdx = inputs.indexOf(e.target);
    if (currentIdx < inputs.length - 1) {
      inputs[currentIdx + 1].focus();
    } else if (!pairShuffleBtn.disabled) {
      executePairShuffle();
    }
  }
});

pairCancelBtn.addEventListener('click', () => {
  pairOverlay.classList.remove('visible');
});

pairShuffleBtn.addEventListener('click', executePairShuffle);

function executePairShuffle() {
  const gen = allGenerators[activePairIdx];
  const inputs = [...pairModalBody.querySelectorAll('.pair-input')];
  const names = inputs.map(inp => inp.value.trim());

  if (names.some(n => !n)) return;

  lastPairInputs = [...names];
  pairOverlay.classList.remove('visible');

  // Shuffle names and pair with slots (sorted by weight/sort order)
  const slots = [...gen.outcomes].sort((a, b) => a.weight - b.weight);
  const shuffled = shuffle(names);

  // Show result in bottom panel
  resultChance.classList.remove('visible');
  resultChance.textContent = '';
  resultValue.classList.add('exit');
  resultBox.classList.remove('flash');

  setTimeout(() => {
    resultValue.textContent = `${slots.length} pairs assigned`;
    resultValue.classList.remove('exit');
    resultValue.classList.add('enter');
    void resultBox.offsetWidth;
    resultBox.classList.add('flash');
    setTimeout(() => { resultValue.classList.remove('enter'); }, 30);
    setTimeout(() => { resultBox.classList.remove('flash'); }, 600);
  }, 280);

  // Show pair results in scroll area
  renderPairResults(gen, slots, shuffled);
}

function renderPairResults(gen, slots, shuffledNames) {
  pairResultsEl.classList.remove('hidden');
  pairResultsTitle.textContent = gen.name;
  pairTable.innerHTML = '';

  slots.forEach((slot, i) => {
    const row = document.createElement('div');
    row.className = 'pair-row';
    row.style.animationDelay = `${i * 0.06}s`;
    row.innerHTML = `
      <div class="pair-slot">${slot.text}</div>
      <div class="pair-arrow">=</div>
      <div class="pair-name">${shuffledNames[i]}</div>
    `;
    pairTable.appendChild(row);
  });

  // Scroll to show results
  const scroll = document.querySelector('.gen-scroll');
  setTimeout(() => {
    pairResultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);

  // Store for reshuffle
  pairReshuffle.onclick = () => {
    const reshuffled = shuffle(lastPairInputs);
    renderPairResults(gen, slots, reshuffled);
  };
}

// ── Toggle no-repeat ──
noRepeatToggle.addEventListener('click', () => {
  if (activeGenIdx === null) return;
  if (allGenerators[activeGenIdx].pairMode) return;
  noRepeatState[activeGenIdx] = !isNoRepeat(activeGenIdx);
  updateToggleUI();
  if (currentTag) renderGenerators();
});

// ── Reset ──
resetBtn.addEventListener('click', () => {
  for (const key in remaining) delete remaining[key];
  for (const key in noRepeatState) delete noRepeatState[key];
  for (const key in history) delete history[key];
  activeGenIdx = null;
  activePairIdx = null;
  lastPairInputs = [];
  lastPickedChance = null;
  resultValue.innerHTML = '<span class="result-placeholder">Tap a generator above</span>';
  resultChance.classList.remove('visible');
  resultChance.textContent = '';
  freqSection.classList.add('hidden');
  pairResultsEl.classList.add('hidden');
  updateToggleUI();
  if (currentTag) renderGenerators();
  resetBtn.textContent = '✓ Reset!';
  resetBtn.style.borderColor = 'var(--success)';
  resetBtn.style.color = 'var(--success)';
  setTimeout(() => {
    resetBtn.textContent = 'Reset All Generators';
    resetBtn.style.borderColor = '';
    resetBtn.style.color = '';
  }, 1000);
});

// ── Load config ──
async function init() {
  try {
    const resp = await fetch('generators.txt');
    const text = await resp.text();
    allGenerators = parseConfig(text);
    const seen = new Set();
    for (const g of allGenerators) {
      if (!seen.has(g.tag)) { seen.add(g.tag); tags.push(g.tag); }
    }
    renderTags();
  } catch (e) {
    tagList.innerHTML = `<div class="empty">
      <div class="icon">⚠️</div>
      <p>Could not load <strong>generators.txt</strong><br>${e.message}</p>
    </div>`;
  }
}

init();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
